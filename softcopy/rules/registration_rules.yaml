rules:
  - rule_id: REG-020
    title: source_code_document_page_window
    rule_status: active
    severity_default: ERROR
    authority_level: A
    source_type: official
    source_name: 国家版权局规章《计算机软件著作权登记办法》
    source_ref: https://www.ncac.gov.cn/xxfb/flfg/bmgz/202410/P020241015604759788122.pdf
    source_locator: 第十条，第42至46行
    jurisdiction: CN
    scope_level: national
    office_selector: []
    effective_version: 国家版权局1号令
    effective_from: "2002-02-20"
    last_reviewed_at: "2026-04-22"
    reviewed_by: Codex
    applies_to:
      - code_doc
    threshold:
      front_pages: 30
      back_pages: 30
      fallback_if_total_lt: 60
    notes: 程序鉴别材料前后各连续30页，不足60页的应全部提交。
  - rule_id: REG-021
    title: source_code_lines_per_page
    rule_status: active
    severity_default: ERROR
    authority_level: A
    source_type: official
    source_name: 国家版权局规章《计算机软件著作权登记办法》
