    source_locator: 第十条，第42至46行
    jurisdiction: CN
    scope_level: national
    office_selector: []
    effective_version: 国家版权局1号令
    effective_from: "2002-02-20"
    last_reviewed_at: "2026-04-22"
    reviewed_by: Codex
    applies_to:
      - code_doc
    threshold:
      min_lines_per_page: 50
    notes: 程序每页不少于50行，结果页和注释不计在内。
